# Clash Configuration Template
# This template is used by clash_sub_converter.py to generate configurations
# Modify this file to customize the generated output

# Basic settings
port: 7890                # HTTP proxy port
socks-port: 7891          # SOCKS5 proxy port
allow-lan: true           # Allow LAN connections (required for sharing)
mode: rule                # Proxy mode: rule/global/direct
log-level: info           # Log level: silent/error/warning/info/debug
ipv6: false               # Disable IPv6 (recommended for stability)

# External controller for dashboard
external-controller: 127.0.0.1:9090
secret: ""                # API secret (optional)

# DNS Configuration (optional but recommended)
# dns:
